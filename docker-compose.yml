version: "3.9"

services:
  smartseat:
    build: .
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=5000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATA_SEED=${DATA_SEED:-42}
    volumes:
      - smartseat-data:/app/data
      - smartseat-qr:/app/qr_codes

volumes:
  smartseat-data:
  smartseat-qr:
